# GitHub Actions Workflow (`.github/workflows/python.yml`)

```yaml
name: TorchANFIS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy scikit-learn pytest pandas

    - name: Run tests
      run: |
        pytest tests/ -v

  benchmark:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy scikit-learn pandas

    - name: Run benchmark
      run: |
        python benchmarks/benchmark_torchanfis.py